model = "qwen3:8b"

[ollama]
# base_url = "http://host.docker.internal:11434"

[anthropic]
# api_key = "sk-ant-..."  # defaults to $ANTHROPIC_API_KEY

[gemini]
# api_key = "AIza..."     # defaults to $GEMINI_API_KEY

[notify.discord]
