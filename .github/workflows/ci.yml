name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra anthropic
      - run: uv run ty check

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra anthropic
      - run: uv run ruff check
      - run: uv run ruff format --check

  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: jobwatch
          POSTGRES_PASSWORD: jobwatch
          POSTGRES_DB: jobwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra anthropic
      - run: uv run pytest
        env:
          JOBWATCH_CONFIG: config.test.toml
