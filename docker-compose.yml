services:
  jobwatch:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
    extra_hosts:
      # Lets the container reach Ollama on the Mac host; a no-op on Docker Desktop
      # (where host.docker.internal already resolves) but needed elsewhere.
      - "host.docker.internal:host-gateway"
