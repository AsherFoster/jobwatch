services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: jobwatch
      POSTGRES_PASSWORD: jobwatch
      POSTGRES_DB: jobwatch
    ports:
      - "5432:5432"
    volumes:
      - jobwatch_db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jobwatch" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jobwatch_db:
