# Copy to config.toml and edit. config.toml is gitignored (it holds your webhook URL).
# Every setting has a default, so the file itself is optional.
# Searches live in the database, not here — see README.

# database_url = "sqlite:///data/jobwatch.db"  # any SQLAlchemy URL works

[llm]
provider = "ollama"    # or "anthropic" / "gemini" (requires: uv sync --extra anthropic / --extra gemini)
model = "qwen3:8b"

[llm.ollama]
# From inside Docker, the Mac host's Ollama is reachable at host.docker.internal:
base_url = "http://host.docker.internal:11434"

[notify.discord]
webhook_url = "https://discord.com/api/webhooks/CHANGE-ME"

[schedule]
interval_minutes = 60

[web]
base_url = "http://localhost:8000"  # used for the "review all" link in notifications
